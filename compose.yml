name: stoat

networks:
  stoat_network:
    driver: bridge

services:
  # MongoDB: Database
  database:
    image: docker.io/mongo
    restart: always
    networks:
      - stoat_network
    volumes:
      - ./data/db:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 10s

  # Redis: Event message broker & KV store
  redis:
    networks:
      - stoat_network
    image: docker.io/eqalpha/keydb
    restart: always

  # RabbitMQ: Internal message broker
  rabbit:
    image: docker.io/rabbitmq:4
    restart: always
    networks:
      - stoat_network
    environment:
      RABBITMQ_DEFAULT_USER: rabbituser
      RABBITMQ_DEFAULT_PASS: rabbitpass
    volumes:
      - ./data/rabbit:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 20s

  # MinIO: S3-compatible storage server
  minio:
    image: docker.io/minio/minio
    command: server /data
    volumes:
      - ./data/minio:/data
    environment:
      MINIO_ROOT_USER: minioautumn
      MINIO_ROOT_PASSWORD: minioautumn
      MINIO_DOMAIN: minio
    networks:
      stoat_network:
        aliases:
          - revolt-uploads.minio
          # legacy support:
          - attachments.minio
          - avatars.minio
          - backgrounds.minio
          - icons.minio
          - banners.minio
          - emojis.minio
    restart: always

  # API server
  api:
    image: ghcr.io/stoatchat/api:v0.11.1
    networks:
      - stoat_network
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_started
      rabbit:
        condition: service_healthy
    volumes:
      - type: bind
        source: ./Revolt.toml
        target: /Revolt.toml
    restart: always

  # Events service
  events:
    image: ghcr.io/stoatchat/events:v0.11.1
    networks:
      - stoat_network
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - type: bind
        source: ./Revolt.toml
        target: /Revolt.toml
    restart: always

  # File server
  autumn:
    image: ghcr.io/stoatchat/file-server:v0.11.1
    networks:
      - stoat_network
    depends_on:
      database:
        condition: service_healthy
      createbuckets:
        condition: service_started
    volumes:
      - type: bind
        source: ./Revolt.toml
        target: /Revolt.toml
    restart: always

  # Metadata and image proxy
  january:
    image: ghcr.io/stoatchat/proxy:v0.11.1
    networks:
      - stoat_network
    volumes:
      - type: bind
        source: ./Revolt.toml
        target: /Revolt.toml
    restart: always

  # Tenor proxy
  gifbox:
    image: ghcr.io/stoatchat/gifbox:v0.11.1
    networks:
      - stoat_network
    volumes:
      - type: bind
        source: ./Revolt.toml
        target: /Revolt.toml
    restart: always

  # Regular task daemon
  crond:
    image: ghcr.io/stoatchat/crond:v0.11.1
    networks:
      - stoat_network
    depends_on:
      database:
        condition: service_healthy
      minio:
        condition: service_started
    volumes:
      - type: bind
        source: ./Revolt.toml
        target: /Revolt.toml
    restart: always

  # Push notification daemon
  pushd:
    image: ghcr.io/stoatchat/pushd:v0.11.1
    networks:
      - stoat_network
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_started
      rabbit:
        condition: service_healthy
    volumes:
      - type: bind
        source: ./Revolt.toml
        target: /Revolt.toml
    restart: always

   # Voice ingress daemon
  voice-ingress:
    image: ghcr.io/stoatchat/voice-ingress:v0.11.1
    networks:
      - stoat_network
    restart: always
    depends_on:
      database:
        condition: service_healthy
      rabbit:
        condition: service_healthy
    volumes:
      - type: bind
        source: ./Revolt.toml
        target: /Revolt.toml

  livekit:
    image: ghcr.io/stoatchat/livekit-server:v1.9.6
    networks:
      - stoat_network
    depends_on:
      redis:
        condition: service_started
    command: --config /etc/livekit.yml
    ports:
      - "7881:7881"
      - "50000-50100:50000-50100/udp"
    restart: always
    volumes:
      - type: bind
        source: ./livekit.yml
        target: /etc/livekit.yml

  # Create buckets for minio.
  createbuckets:
    image: docker.io/minio/mc
    networks:
      - stoat_network
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      while ! /usr/bin/mc ready minio; do
        /usr/bin/mc alias set minio http://minio:9000 minioautumn minioautumn;
        echo 'Waiting minio...' && sleep 1;
      done;
      /usr/bin/mc mb minio/revolt-uploads;
      exit 0;
      "

  # Web App
  web:
    image: stoat-for-web/nornn
    networks:
      - stoat_network
    restart: always
    env_file: .env.web

  # nginx
  nginx:
    image: nginx:latest
    networks:
      - stoat_network
    ports:
      - "443:443"
    volumes:
      - ./configs/nginx.conf:/etc/nginx/conf.d/stoat.conf:ro
      - ./certs:/etc/letsencrypt/:ro
    restart: always
    depends_on:
      - api
      - events
      - autumn
      - january
      - gifbox
      - livekit
      - web
      - certbot

  nginx-cron:
    image: docker:stable
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint: >
      sh -c '
        apk add --no-cache bash
        echo "0 3 * * 0 docker exec nginx nginx -s reload" > /etc/crontabs/root
        crond -f -d 8
      '
    depends_on:
      - nginx

  # certbot initial + renew
  certbot:
    image: certbot/certbot
    container_name: certbot
    ports:
      - "80:80"
    volumes:
      - ./certs:/etc/letsencrypt
    restart: always
    env_file: domain.env
    entrypoint: >
      sh -c '
        set -e

        if [ ! -d "/etc/letsencrypt/live/$$DOMAIN" ]; then
          echo "No certificate found for $$DOMAIN. Requesting initial certificate..."
          certbot certonly --standalone -d $$DOMAIN --agree-tos --no-eff-email
        else
          echo "Certificate already exists for $$DOMAIN. Skipping initial request."
        fi

        trap exit TERM;

        while :; do
          echo "Running certbot renew..."
          certbot renew --standalone --quiet
          sleep 12h
        done
      '